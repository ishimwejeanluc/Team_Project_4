name: Branch Protection (as code)

# Applies branch protection rules to dev, test and main from version-controlled config.
#
# WHY a workflow: branch protection is a server-side setting. Configuring it by hand
# in the UI is not reproducible and drifts over time. This workflow makes the rules
# code: review them in PRs, re-apply them on demand, and keep every branch consistent.
#
# Branching model enforced here:   feature -> dev -> test -> main
#   - No direct pushes to dev / test / main (changes must arrive via Pull Request).
#   - Every PR must pass CI (the "PR Gate" status check) before it can merge.
#   - Every PR needs at least 1 approving review.
#   - main is the strictest (admins included, linear history, conversations resolved).
#
# REQUIREMENT: the default GITHUB_TOKEN cannot edit branch protection.
# Create a fine-grained or classic PAT with "Administration: write" (repo admin) on
# this repo and add it as a repository secret named BRANCH_PROTECTION_TOKEN.

on:
  # Run manually whenever you want to (re)apply the rules.
  workflow_dispatch:
  # Auto re-apply when the rules themselves change on main.
  push:
    branches: [main]
    paths:
      - ".github/workflows/branch-protection.yml"

permissions:
  contents: read

jobs:
  apply:
    name: Apply protection to ${{ matrix.branch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [dev, test, main]

    steps:
      - name: Validate admin token is present
        env:
          ADMIN_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::error::Secret BRANCH_PROTECTION_TOKEN is not set. Create a PAT with 'Administration: write' and add it as a repo secret."
            exit 1
          fi

      - name: Build protection rules for ${{ matrix.branch }}
        id: rules
        run: |
          BRANCH="${{ matrix.branch }}"

          # INTERIM RULES (bootstrapping — CI/tests not ready yet).
          #
          #  - No direct pushes for the TEAM: changes to dev/test/main must go through a
          #    Pull Request with >= 1 approving review.
          #  - enforce_admins=false  => the repo ADMIN is exempt and can push DIRECTLY.
          #    On a personal repo you can't whitelist specific users (that's org-only),
          #    so this is how "only the admin can push to main" is achieved: everyone
          #    else is forced through PRs, the admin bypasses the rules.
          #  - required_status_checks=null  => no CI gate yet (we don't have the checks).
          #    RE-ENABLE LATER by replacing null with:
          #        { "strict": true, "contexts": ["PR Gate"] }
          #  - no force-push / no branch deletion.
          REQUIRED_REVIEWS=1

          cat > rules.json <<EOF
          {
            "required_status_checks": null,
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": ${REQUIRED_REVIEWS}
            },
            "required_linear_history": false,
            "required_conversation_resolution": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "restrictions": null
          }
          EOF

          echo "Computed rules for $BRANCH:"
          cat rules.json

      - name: Apply protection via GitHub API
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
        run: |
          BRANCH="${{ matrix.branch }}"
          echo "Applying branch protection to '$BRANCH'..."
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/branches/${BRANCH}/protection" \
            --input rules.json
          echo "✅ Protection applied to '$BRANCH'."

      - name: Summary
        if: always()
        run: |
          {
            echo "### Branch protection — ${{ matrix.branch }}"
            echo ""
            echo "| Rule | Value |"
            echo "|------|-------|"
            echo "| Direct pushes (team) | ❌ blocked (PR required) |"
            echo "| Direct pushes (admin) | ✅ allowed (enforce_admins=false) |"
            echo "| Approving reviews required | 1 |"
            echo "| Dismiss stale approvals | ✅ |"
            echo "| Required CI check | ⏳ none yet (re-enable \`PR Gate\` later) |"
            echo "| Force pushes | ❌ |"
            echo "| Branch deletion | ❌ |"
          } >> "$GITHUB_STEP_SUMMARY"
